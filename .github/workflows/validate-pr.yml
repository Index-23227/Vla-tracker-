name: Validate PR Data

on:
  pull_request:
    paths:
      - 'data/**'
      - 'README.md'
      - 'dashboard/**'
      - 'physical-ai-dashboard-blueprint.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate data integrity
        run: python scripts/validate_data.py

      - name: Build leaderboard (dry run)
        run: python scripts/build_leaderboard.py

      - name: Validate documentation counts
        run: python scripts/validate_counts.py

      - name: Check AI review coverage
        run: python scripts/check_reviews.py || true
