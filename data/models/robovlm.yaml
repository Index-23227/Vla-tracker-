name: RoboVLM
version: "1.0"
organization: "Tsinghua University / ByteDance Research / CASIA / SJTU / NUS"
paper_url: https://arxiv.org/abs/2412.14058
code_url: https://github.com/Robot-VLM/RoboVLM
date: "2024-11-18"
venue: "ICLR 2025"
architecture:
  backbone: "KosMos VLM (best config; framework supports 8 VLM backbones)"
  llm: "KosMos 2B (best config)"
  action_head: "latent action tokenization (VQ-VAE) + autoregressive"
  action_space: "discrete latent → continuous"
  parameters: "1.5B"
  key_innovation: "Unified visual-action tokenization via VQ-VAE; treats actions as latent visual tokens for cross-embodiment transfer"
training:
  dataset: "Open X-Embodiment"
  method: "Pre-train VQ-VAE action tokenizer → fine-tune VLM"
  compute: "32 A100 GPUs"
benchmarks:
  libero:
    libero_spatial: 91.8
    libero_object: 93.4
    libero_goal: 86.8
    libero_long: 64.2
    source: "Table 1, RoboVLM paper"
    date_reported: "2024-11-18"
    eval_condition: "fine-tuned"
  calvin:
    calvin_abc_d_avg_len: 3.5
    source: "Table 2, RoboVLM paper"
    date_reported: "2024-11-18"
    eval_condition: "fine-tuned"
open_source: true
tags: [1.5B, VQ-VAE, autoregressive, manipulation, open-source, cross-embodiment]
