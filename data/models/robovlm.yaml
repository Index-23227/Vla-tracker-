name: RoboVLM
version: '1.0'
organization: Tsinghua University / ByteDance Research / CASIA / SJTU / NUS
paper_url: https://arxiv.org/abs/2412.14058
code_url: https://github.com/Robot-VLM/RoboVLM
date: '2024-12-18'
venue: ICLR 2025
architecture:
  backbone: KosMos VLM (best config; framework supports 8 VLM backbones)
  llm: KosMos 2B (best config)
  action_head: latent action tokenization (VQ-VAE) + autoregressive
  action_space: discrete latent → continuous
  parameters: 2B
  key_innovation: Unified visual-action tokenization via VQ-VAE; treats actions as latent visual tokens for cross-embodiment
    transfer
  action_head_category: autoregressive
training:
  dataset: Open X-Embodiment
  method: Pre-train VQ-VAE action tokenizer → fine-tune VLM
  compute: 32 A100 GPUs
benchmarks:
  calvin:
    calvin_abc_d_avg_len: 4.25
    source: Extended Table 2 (KosMos Policy-Head; Round 28 PDF audit corrected from earlier 3.5 attribution)
    date_reported: '2024-12-18'
    eval_condition: fine-tuned
open_source: true
tags:
- 2B
- VQ-VAE
- autoregressive
- manipulation
- open-source
- cross-embodiment
