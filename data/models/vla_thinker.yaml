# Paper: VLA-Thinker: Boosting Vision-Language-Action Models through Thinking-with-Image Reasoning
# arXiv: 2603.14523

name: VLA-Thinker
full_name: "VLA-Thinker: Boosting Vision-Language-Action Models through Thinking-with-Image Reasoning"
organization: "University of Central Florida / University of Wurzburg / USC / NVIDIA Research"
date: "2026-03-15"
paper_url: https://arxiv.org/abs/2603.14523
code_url: https://github.com/CYWang735/VLAThinker
venue: null
open_source: true

architecture:
  backbone: "PrismaticVLM (SigLIP + DinoV2)"
  llm: "Llama-2 7B"
  action_head: "autoregressive"
  parameters: "7B"

key_innovation: >
  Thinking-with-image reasoning framework that models perception as a dynamically invocable
  reasoning action. Uses two-stage training: SFT cold-start with visual CoT data, then
  GRPO-based RL to align reasoning-action trajectories with task-level success.

benchmarks:
  libero:
    libero_spatial: 98.7
    libero_object: 99.0
    libero_goal: 95.2
    libero_long: 96.9
  robotwin_v2:
    lift_pot: 64.8
    beat_hammer_block: 82.5
    pick_dual_bottles: 65.4
    place_phone_stand: 36.6
    move_can_pot: 61.0
    place_a2b_left: 39.1
    place_empty_cup: 92.7
    handover_mic: 89.9
    handover_block: 52.8
    stack_bowls_two: 71.1
    blocks_rank_rgb: 79.3
    put_bottles_dustbin: 55.4
    short_horizon_avg: 62.3
    medium_horizon_avg: 70.7
    long_horizon_avg: 64.6

eval_conditions:
  libero: "SFT + RL fine-tuned (GRPO)"
  robotwin_v2: "SFT + RL fine-tuned (GRPO)"

tags: [reasoning, libero, robotwin, robotwin_v2, open-source]
