  key_innovation: "ViVa repurposes a pretrained video generator as a value model for robot RL, taking the current observation and proprioception and jointly predicting future proprioception plus a scalar value for the current state. By leveraging spatiotemporal priors from video corpora, value estimation is grounded in anticipated embodiment dynamics rather than static snapshots, and when integrated into RECAP it delivers substantial improvements on real-world box assembly."

