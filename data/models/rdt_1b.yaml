name: RDT-1B
version: "1.0"
organization: "Tsinghua University / Shanghai Qi Zhi Institute"
paper_url: https://arxiv.org/abs/2410.07864
code_url: https://github.com/thu-ml/RoboticsDiffusionTransformer
date: "2024-10-10"
venue: "ICLR 2025"
architecture:
  backbone: "SigLIP + language encoder"
  llm: null
  action_head: "diffusion (scalable transformer)"
  action_space: "continuous"
  parameters: "1.2B"
  key_innovation: "Largest pre-trained diffusion foundation model for robotics; scalable transformer denoiser"
training:
  dataset: "Open X-Embodiment + DROID (~1M trajectories)"
  num_trajectories: 1000000
  compute: "64 A100 GPUs"
benchmarks:
  libero:
    libero_spatial: 90.2
    libero_object: 91.8
    libero_goal: 85.6
    libero_long: 62.4
    source: "Table 2, RDT-1B paper"
    date_reported: "2024-10-10"
    eval_condition: "fine-tuned"
  calvin:
    calvin_abc_d_avg_len: 3.4
    source: "Table 3, RDT-1B paper"
    date_reported: "2024-10-10"
    eval_condition: "fine-tuned"
  robotwin:
    robotwin_easy: 42.6
    robotwin_hard: 14.4
    source: "RoboTwin 2.0 paper"
    date_reported: "2025-06-24"
    eval_condition: "fine-tuned"
open_source: true
tags: [1.2B, diffusion, manipulation, open-source, foundation-model, bimanual]
