name: StableIDM
full_name: "StableIDM: Stabilizing Inverse Dynamics Model against Manipulator Truncation via Spatio-Temporal Refinement"
organization: "GigaAI / Institute of Automation, Chinese Academy of Sciences / Beijing Institute of Technology"
date: "2026-04-20"
paper_url: https://arxiv.org/abs/2604.17887
code_url: null
venue: null
open_source: false

architecture:
  backbone: "DINOv2 (visual encoder) + Segment Anything (robot-centric masking)"
  llm: null
  action_head: "History-conditioned action decoder f_θ: base MLP regressor per-frame + TCN temporal correction over visual feature history (Directional Feature Aggregation + Temporal Dynamics Refinement)"
  action_head_category: inverse_dynamics
  parameters: "TODO"
  key_innovation: "StableIDM is a spatio-temporal refinement framework for inverse dynamics under manipulator truncation. It combines robot-centric masking via SAM to suppress background clutter, Directional Feature Aggregation for anisotropic features along inferred arm directions, and Temporal Dynamics Refinement that enforces motion continuity. Paper reports StableIDM 0.307/0.493 acc/dist on AgiBot heavy-truncation offline (vs ResNet 0.150/0.679), 47.4% real-robot replay success (vs 37.7% best baseline), 53.8% video-plan grasp success (vs 42.3% AnyPos), and lifts downstream VLA real-robot success from 35.3% (real-only) to 52.9% when used as an auto-annotator."

training:
  dataset: "AgiBot subset (100 episodes across ten everyday manipulation tasks: articulated-object, tabletop pick-and-place, cleaning)"
  method: "Supervised inverse dynamics learning"

benchmarks: {}

tags: [inverse-dynamics, manipulator-truncation, spatio-temporal, robustness, data-annotation, AgiBot]
