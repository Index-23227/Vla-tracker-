code_url: https://github.com/NVIDIA/Isaac-GR00T
date: '2025-03-18'
venue: null
architecture:
  backbone: Eagle-2 VLM (SigLIP-2 + SmolLM2)
  llm: SmolLM2 (within Eagle-2 VLM)
  action_head: diffusion transformer (S1 system)
