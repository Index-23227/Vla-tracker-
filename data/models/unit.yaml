  parameters: "TODO"
  key_innovation: "UniT proposes a Unified Latent Action Tokenizer that establishes a shared physical language between egocentric human video and humanoid robot actions by anchoring heterogeneous kinematics to their common visual consequences. A tri-branch cross-reconstruction design (actions predict vision, vision reconstructs actions, plus a fusion branch) produces a shared discrete latent space of embodiment-agnostic physical intents; a downstream policy (VLA-UniT) and world model (WM-UniT) are learned by predicting these unified tokens, yielding strong data efficiency and zero-shot cross-embodiment transfer."

