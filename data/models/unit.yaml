  parameters: "TODO"
  key_innovation: "UniT proposes a Unified Latent Action Tokenizer that establishes a shared physical language between egocentric human video and humanoid robot actions by anchoring heterogeneous kinematics to their common visual consequences. A tri-branch cross-reconstruction mechanism has actions predict vision (anchoring kinematics to physical outcomes) and vision reconstruct actions (filtering irrelevant visual confounders), while a fusion branch synergizes purified modalities into a shared discrete latent space of embodiment-agnostic physical intents."

