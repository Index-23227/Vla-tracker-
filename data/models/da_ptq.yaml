name: DA-PTQ
full_name: "DA-PTQ: Drift-Aware Post-Training Quantization for Efficient Vision-Language-Action Models"
organization: "Tongji University / University of Technology Sydney"
date: "2026-04-13"
paper_url: https://arxiv.org/abs/2604.11572
code_url: null
venue: null
open_source: false

architecture:
  backbone: "inherited from base VLA (CogACT in paper experiments)"
  llm: "inherited from CogACT"
  action_head: "Post-training quantization applied over an existing diffusion VLA (CogACT). Targets the MLP blocks within the Diffusion Transformer (DiT) action head; final 2 DiT blocks (closest to continuous output) are preserved at high precision. Top 30% drift-sensitive DiT layers retained at BF16, remaining 70% quantized to W4. Outputs 7-DoF (3D translation + 3D rotation + gripper) continuous control via the original CogACT diffusion denoiser."
  action_head_category: diffusion
  parameters: "TODO"
  key_innovation: "DA-PTQ is a training-free drift-aware post-training quantization framework for VLAs. (1) Cross-Space Representation Compensation orthogonalizes input/output activations via SVD-based block-wise rotation with smoothing, then folds compensation matrices back into quantized weights with zero inference overhead. (2) Motion-Driven Mixed-Precision Allocation profiles per-layer drift sensitivity using a structural Jacobian with Tikhonov damping (λ=3e-4), heavily penalizing translational error (w_trans=1.8 vs w_rot=0.15), and retains the top k=30% drift-sensitive layers at BF16. On WidowX SimplerEnv VM, DA-PTQ W4A8 attains 48.9% avg (vs CogACT FP 51.3, VLA-Cache 46.8, QuantVLA 43.5). On Google Robot SimplerEnv VM 68.5% (vs CogACT FP 74.8). Achieves 42.5% memory reduction and 54.8% inference speedup over CogACT FP."

training:
  dataset: "Calibration set: 512 trajectories from BridgeData V2 train split with spatial-balanced binning (6 bins, 128 warmup steps); no retraining"
  method: "Training-free post-training quantization implemented in PyTorch on NVIDIA RTX 5090 GPUs"

