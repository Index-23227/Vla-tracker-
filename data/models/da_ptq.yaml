name: DA-PTQ
full_name: "DA-PTQ: Drift-Aware Post-Training Quantization for Efficient Vision-Language-Action Models"
organization: "Tongji University / University of Technology Sydney"
date: "2026-04-13"
paper_url: https://arxiv.org/abs/2604.11572
code_url: null
venue: null
open_source: false

architecture:
  backbone: "inherited from base VLA (CogACT in paper experiments)"
  llm: "inherited from CogACT"
  action_head: "Post-training quantization applied over an existing diffusion VLA (CogACT). Outputs 7-D Cartesian deltas [dx, dy, dz, drx, dry, drz, dg] via the original diffusion denoiser."
  action_head_category: diffusion
  parameters: "TODO"
  key_innovation: "DA-PTQ is a drift-aware post-training quantization method for VLAs. Cross-Space Representation Compensation corrects structured distortions across the vision-language-to-action interface, and Motion-Driven Mixed-Precision Allocation assigns per-layer bit-widths by minimizing trajectory-level motion error. Applied to CogACT at W4A8 it preserves most SimplerEnv WidowX performance (visual-matching avg 51.3 vs CogACT FP 48.9) with larger drops on Google-Robot drawer tasks (visual-matching avg 68.5 vs 74.8)."

training:
  dataset: "Calibration set: 512 trajectories from BridgeData V2 train split (no retraining)"
  method: "Training-free post-training quantization"

benchmarks:
  simpler_env:
    widowx_visual_matching_avg: 51.3
    google_robot_visual_matching_avg: 68.5
    google_robot_variant_aggregation_avg: 51.7
    eval_condition: "W4A8 quantized CogACT (drift-aware PTQ), zero-shot"
    source: "Tables 2-3"

tags: [quantization, post-training, efficiency, deployment, mixed-precision, drift-aware]
