  key_innovation: "DA-PTQ casts post-training quantization of VLAs as a drift-aware optimization over sequential decision processes to mitigate temporal error accumulation at the vision-language-to-action interface. It introduces Cross-Space Representation Compensation to reduce structured distortions between multimodal representations and action space, and Motion-Driven Mixed-Precision Allocation that assigns bit-widths by minimizing trajectory-level motion errors, enabling low-bit deployment with performance comparable to full precision."

