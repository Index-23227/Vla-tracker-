name: DepthCache
full_name: "DepthCache: Depth-Guided Training-Free Visual Token Merging for Vision-Language-Action Model Inference"
organization: "Huazhong University of Science and Technology"
date: "2026-03-11"
paper_url: https://arxiv.org/abs/2603.10469
code_url: null
venue: "Submitted to IEEE (per author note)"
open_source: false

architecture:
  backbone: "N/A (training-free wrapper; inherits backbone of host VLA, e.g., SigLIP for pi0.5, SigLIP+DINOv2 for OpenVLA, Eagle for GR00T)"
  llm: "N/A (inherits LLM of host VLA, e.g., Gemma for pi0.5, Llama 2 for OpenVLA)"
  action_head: "Training-free inference-time visual token merging wrapper; does not modify the underlying VLA action head (e.g., flow-matching for pi0.5, autoregressive for OpenVLA, Diffusion Transformer for GR00T)"
  action_head_category: other
  parameters: "TODO"
  key_innovation: "DepthCache is a training-free, model-agnostic visual-token compression wrapper for VLA inference that repurposes depth as an external structural prior rather than a perceptual input. It partitions unprotected visual tokens into K depth-based regions via K-Means and assigns spatially differentiated merge ratios that scale with mean depth (preserving near-field workspace, compressing distant background). Token merging is distributed progressively across consecutive frames rather than within a single forward pass, with attention- and depth-edge-based dual protection of task-critical tokens, plus a motion-adaptive state machine for wrist cameras. Wraps base VLAs (pi0.5, OpenVLA, GR00T) for 1.07x-1.28x speedup with <1% LIBERO success-rate degradation."

benchmarks:
  libero:
    libero_spatial: 98.9
    libero_object: 97.1
    libero_goal: 98.3
    libero_long: 96.1
    libero_avg: 97.6
    source: "Table I (pi0.5 + DepthCache)"
    eval_condition: "fine-tuned; pi0.5 + DepthCache wrapper; training-free inference-time compression"

training:
