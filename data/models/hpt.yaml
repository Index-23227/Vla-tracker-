name: HPT
version: '1.0'
organization: MIT / Meta FAIR
paper_url: https://arxiv.org/abs/2409.20537
code_url: https://github.com/liruiw/HPT
date: '2024-09-30'
venue: NeurIPS 2024 (Spotlight)
architecture:
  backbone: Heterogeneous stem encoders (per embodiment)
  llm: null
  action_head: shared transformer trunk + task-specific heads
  action_space: continuous
  parameters: 300M
  key_innovation: Heterogeneous pre-training across diverse robot embodiments; shared trunk learns universal representations
  action_head_category: regression
training:
  dataset: 52 datasets, multiple embodiments
  method: Pre-training with heterogeneous stems → shared transformer
  compute: 64 A100 GPUs
benchmarks: {}
# Note: Earlier YAML versions claimed LIBERO scores (avg ~77) and SimplerEnv 62.4 citing
# "Table 2, HPT paper" — the actual paper Table 2 is the pre-train dataset list, not a
# LIBERO benchmark table. The paper does not report LIBERO numbers. Removed in Round 32
# audit to prevent attribution misrepresentation.
open_source: true
tags:
- 300M
- heterogeneous
- cross-embodiment
- manipulation
- open-source
