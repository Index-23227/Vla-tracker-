name: VP-VLA
full_name: "VP-VLA: Visual Prompting as an Interface for Vision-Language-Action Models"
organization: "HKUST; CUHK; SmartMore"
date: "2026-03-23"
paper_url: https://arxiv.org/abs/2603.22003
code_url: https://visualprompt-vla.github.io/
venue: null
open_source: false

architecture:
  backbone: "Qwen3-VL-4B-Instruct (replaces Prismatic VLM in OpenVLA-OFT, forming QwenOFT architecture); SAM3 for segmentation; visual prompts (crosshair markers and bounding boxes) overlaid on observations"
  llm: "Qwen3-VL-4B-Instruct"
  action_head: "QwenOFT continuous action decoder (OpenVLA-OFT-style with L1 action loss)"
  action_head_category: regression
  parameters: "4B (VLM); QwenOFT base"
  key_innovation: "Dual-system framework decoupling reasoning and execution via a structured visual prompting interface. A System 2 Planner (Qwen3-VL-4B-Instruct + SAM3) is event-driven (triggered by gripper-state transitions) and decomposes instructions into subtasks, identifies target object and goal location, then renders visual prompts as crosshair markers (object centroid) and bounding boxes (placement region) on overhead-camera observations. A System 1 Controller (QwenOFT VLA) is conditioned on these visual overlays and trained with an auxiliary visual grounding objective (cross-entropy over 1000 spatial bins predicting 2D anchors and bounding boxes), backpropagated only through the VLM."

training:
  framework: "starVLA"
  hardware: "8 GPUs"
  optimizer: "AdamW; VLM LR 1e-5, action model LR 1e-4; grounding loss weight lambda=0.1"
  simpler_steps: "70k steps on Open X-Embodiment subsets BridgeDataV2 + Fractal (batch size 32 per device)"

benchmarks:
  simpler_env:
    simpler_widowx_spoon: 66.7
    simpler_widowx_carrot: 50.0
    simpler_widowx_stack: 20.8
    simpler_widowx_eggplant: 95.8
    simpler_avg: 58.3
    source: "VP-VLA paper Table 2 (WidowX SimplerEnv, Ours + Qwen3VL)"
    date_reported: '2026-03-23'
    eval_condition: fine-tuned
  robocasa:
    robocasa_pnp_close_avg: 54.3
    robocasa_pnp_novel_cuttingboard_avg: 60.8
    robocasa_pnp_novel_placemat_avg: 54.5
    robocasa_pnp_novel_tray_avg: 46.0
    robocasa_pnp_novel_plate_avg: 53.5
    robocasa_avg: 53.8
    source: "VP-VLA paper Table 1 (RoboCasa-GR1-Tabletop, GR1 robot, Ours + Qwen3VL)"
    date_reported: '2026-03-23'
    eval_condition: fine-tuned

eval_conditions:
  simpler_env: "fine-tuned"
  robocasa: "fine-tuned"

tags: [dual-system, visual-prompting, qwen3-vl, openvla-oft-base, simpler_env, robocasa, manipulation]
