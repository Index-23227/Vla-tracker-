  key_innovation: "LARY introduces a benchmark that evaluates latent action representations learned from over one million human action videos across 151 categories, measuring both semantic-action understanding and generalizable vision-to-action alignment for robotic control. The study finds that general visual foundation models outperform specialized embodied models as latent-action encoders, and that a latent-based visual space is fundamentally better aligned to physical action space than a pixel-based space."

