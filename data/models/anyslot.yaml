  key_innovation: "AnySlot decouples compositional slot-level placement into two stages: a scene-marker generator that converts language into an explicit spatial visual goal, and a goal-conditioned VLA policy that executes this goal. This hierarchical design separates high-level slot selection from low-level execution and is evaluated on the newly introduced SlotBench simulation benchmark of nine slot-placement task categories."

