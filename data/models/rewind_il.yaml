  key_innovation: "Rewind-IL is a training-free online safeguard for generative action-chunked imitation policies that combines a zero-shot Temporal Inter-chunk Discrepancy Estimate (TIDE) failure detector, calibrated via split conformal prediction, with a state-respawning mechanism that returns the robot to a semantically verified safe intermediate state. Offline, a VLM identifies recovery checkpoints in demonstrations and the frozen policy encoder builds a compact checkpoint feature database; online, the system monitors self-consistency across overlapping chunks and rewinds to the latest safe checkpoint on detected failure."

