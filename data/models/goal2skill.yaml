  key_innovation: "Goal2Skill is a dual-system framework for long-horizon embodied manipulation that explicitly separates high-level semantic reasoning from low-level motor execution. A VLM-based agentic planner maintains structured task memory and performs goal decomposition, outcome verification, and error-driven correction, while a VLA-based diffusion visuomotor executor carries out each sub-task conditioned on geometry-preserving filtered observations. The authors report 32.4% average success rate on RMBench, versus 9.8% for the strongest baseline."

