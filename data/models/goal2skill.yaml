name: Goal2Skill
full_name: "Goal2Skill: Long-Horizon Manipulation with Adaptive Planning and Reflection"
organization: "Beijing University of Posts and Telecommunications / InspireOmni AI / Tsinghua University"
date: "2026-04-15"
paper_url: https://arxiv.org/abs/2604.13942
code_url: null
