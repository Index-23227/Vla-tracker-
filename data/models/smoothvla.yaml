name: SmoothVLA
full_name: "SmoothVLA: Aligning Vision-Language-Action Models with Physical Constraints via Intrinsic Smoothness Optimization"
organization: Chongqing University of Posts and Telecommunications / Chinese Academy of Sciences / USTC
date: "2026-03-14"
paper_url: https://arxiv.org/abs/2603.13925
code_url: null
venue: null
