    date_reported: '2025-11-03'
    eval_condition: fine-tuned
  calvin:
    calvin_abc_d_avg_len: 4.64
    source: Table 2, UD-VLA paper
    date_reported: '2025-11-03'
    eval_condition: fine-tuned
open_source: false
tags:
