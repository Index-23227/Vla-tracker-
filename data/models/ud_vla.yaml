name: UD-VLA
version: '1.0'
organization: Tsinghua University / Shanghai AI Lab
paper_url: https://arxiv.org/abs/2511.01718
code_url: null
date: '2025-11-03'
venue: ICLR 2026
architecture:
  backbone: Emu3 + MOVQ visual tokenizer
  llm: Emu3
  action_head: joint discrete denoising diffusion (JD3P)
  action_space: discrete tokens (VQ + FAST)
  parameters: 3B
  key_innovation: Unified diffusion over both vision and action tokens; synchronous denoising is 4x faster than autoregressive
    decoding
  action_head_category: discrete_diffusion
training:
  dataset: Open X-Embodiment + internet data
  method: Joint denoising diffusion pre-training
  compute: 64 A100 GPUs
benchmarks:
